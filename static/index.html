<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>justext</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/app.css" />
  </head>
  <body>
    <main class="page">
      <section class="shell">
        <header class="topbar">
          <div class="brand-lockup">
            <div class="brand-mark" aria-hidden="true">
              <span></span>
            </div>
            <div>
              <p class="brand-name">justext</p>
              <p class="brand-subtitle">youtube transcript</p>
            </div>
          </div>
        </header>

        <section class="hero">
          <h1 class="hero-title">
            Extraia transcrições limpas de vídeos do YouTube
          </h1>
          <p class="hero-copy">
            Transforme legendas disponíveis em texto limpo, pronto para
            leitura, estudo e reaproveitamento.
          </p>

          <form class="hero-form" id="transcriptForm">
            <input
              autocomplete="off"
              class="url-input"
              id="videoUrl"
              name="videoUrl"
              placeholder="https://www.youtube.com/watch?v=..."
              required
              type="url"
            />
            <div class="hero-actions">
              <button class="primary" id="submitButton" type="submit">
                transcrever
              </button>
              <button class="ghost" id="clearButton" type="button">
                limpar
              </button>
            </div>
          </form>

          <p class="status" id="statusMessage">
            cole a URL e clique em transcrever
          </p>
        </section>

        <section class="result hidden" id="resultSection">
          <div class="result-head">
            <div class="result-title-wrap">
              <p class="eyebrow">Output</p>
              <h2 class="result-title" id="resultTitle">transcrição pronta</h2>
            </div>
            <div class="result-actions">
              <button class="primary" id="copyButton" type="button">copiar texto</button>
              <button class="ghost" id="downloadTxtButton" type="button">exportar .txt</button>
            </div>
          </div>

          <div class="context-preview" id="contextPreview"></div>

          <div class="field">
            <textarea id="transcriptOutput" readonly></textarea>
          </div>
        </section>
      </section>
    </main>

    <footer class="site-footer">
      built by <a href="https://github.com/SeaWolfBr" target="_blank" rel="noopener">SeaWolfBr</a>
    </footer>

    <script src="/app.js" type="module"></script>
  </body>
</html>
