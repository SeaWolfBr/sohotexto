services:
  - type: web
    name: justext
    runtime: docker
    plan: starter
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: JUSTEXT_HOST
        value: 0.0.0.0
      - key: JUSTEXT_PORT
        value: "3217"
      - key: JUSTEXT_SECURE_COOKIE
        value: "true"
      - key: JUSTEXT_USER
        sync: false
      - key: JUSTEXT_PASSWORD_HASH
        sync: false
      - key: JUSTEXT_SESSION_SECRET
        sync: false
